<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nctuary</title>
  <meta name="description" content="A private digital sanctuary for stewardship across generations. Authorized access only." />

  <!-- Modern-elegant serif -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.75);
      --hairline: rgba(255,255,255,0.35);
      --shadow: rgba(0,0,0,0.45);
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      color: var(--text);
      background: #0b0f0d;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    /* Fullscreen hero */
    .hero{
      min-height: 100vh;
      background-image:
        /* soft vignette + readability overlay */
           radial-gradient(ellipse at center, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.25) 60%, rgba(0,0,0,0.50) 100%),
           url("assets/hero-bc-moss.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: grid;
      place-items: center;
      padding: 48px 20px;
    }

    /* Glassy, restrained card */
    .panel{
      width: min(760px, 92vw);
      padding: 44px 40px;
      border: 1px solid var(--hairline);
      border-radius: 18px;
      background: rgba(0,0,0,0.18);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 18px 55px rgba(0,0,0,0.35);
      text-align: center;
    }

    h1{
      margin: 0 0 18px;
      font-family: "Cormorant Garamond", serif;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: none;
      font-size: clamp(40px, 5vw, 64px);
      text-shadow: 0 10px 30px var(--shadow);
    }

    .line{
      width: 92px;
      height: 1px;
      background: var(--hairline);
      margin: 18px auto 22px;
    }

    p{
      margin: 0 auto;
      max-width: 54ch;
      font-size: clamp(16px, 1.65vw, 18px);
      line-height: 1.7;
      color: var(--text);
      text-shadow: 0 10px 30px var(--shadow);
    }

    .muted{
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .actions{
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.45);
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: rgba(0,0,0,0.20);
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(0,0,0,0.32);
      border-color: rgba(255,255,255,0.65);
    }

    footer{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 14px 18px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      text-align: center;
      pointer-events: none;
    }

    @media (max-width: 520px){
      .panel{ padding: 34px 22px; }
    }
  </style>
</head>

<body>
  <main class="hero" role="main">
    <section class="panel" aria-label="Sanctuary private access">
      <h1>Sanctuary</h1>
      <div class="line"></div>
      <p>
        A sanctuary is a place of refuge, memory, and continuity.<br/>
        This domain exists for stewardship across generations.
      </p>
      <div class="muted">Authorized access only.</div>

      <div class="actions">
        <!-- Replace the href with your real private portal URL later -->
        <a class="btn" href="#" aria-label="Member access">Member Access</a>
      </div>
    </section>
  </main>

  <footer>© Sanctuary</footer>
</body>
</html>
